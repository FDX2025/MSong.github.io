<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menglin Song — PhD Researcher | Cambridge &amp; UCL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#home" class="nav-logo">Menglin Song</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#home" class="nav-link">Profile</a></li>
        <li><a href="#research" class="nav-link">Research</a></li>
        <li><a href="#publications" class="nav-link">Publications</a></li>
        <li style="display:none"><a href="#news" class="nav-link">News</a></li>
        <li><a href="#experience" class="nav-link">Experience</a></li>
      </ul>
    </div>
  </nav>

  <!-- HOME -->
  <section id="home" class="section hero-section s-light">
    <canvas id="heroCanvas"></canvas>
    <div class="hero-gradient-orb orb-1"></div>
    <div class="hero-gradient-orb orb-2"></div>
    <div class="hero-inner">
      <div class="hero-text">
        <p class="hero-label reveal-anim" style="--d:0.2s" id="heroLabel"></p>
        <h1 class="hero-name reveal-anim" style="--d:0.4s" id="heroName"></h1>
        <p class="hero-identity reveal-anim" style="--d:0.6s" id="heroIdentity"></p>
        <p class="hero-intro reveal-anim" style="--d:0.8s" id="heroIntro"></p>
        <p class="hero-research reveal-anim" style="--d:0.95s" id="heroResearch"></p>
      </div>
      <div class="hero-visual">
        <div class="hero-avatar-col">
          <div class="avatar-frame">
            <div class="avatar-img" id="heroAvatar"></div>
          </div>
          <div class="hero-contact-links" id="heroContact"></div>
        </div>
      </div>
    </div>
    <div class="hero-honors reveal-anim" style="--d:1.0s">
      <p class="hero-section-label">Selected Honors</p>
      <div class="hero-honor-cards" id="honorsContainer"></div>
    </div>

    <div class="hero-edu reveal-anim" style="--d:1.05s">
      <p class="hero-section-label">Education</p>
      <div class="hero-edu-row" id="eduContainer"></div>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
      <div class="scroll-line"></div>
      <span>Scroll</span>
    </div>

  </section>


  <!-- RESEARCH -->
  <section id="research" class="section s-light">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-label">Focus Areas</span>
        <h2 class="section-title">Research</h2>
      </div>
      <div class="research-grid" id="researchContainer"></div>
    </div>
  </section>

  <!-- PUBLICATIONS -->
  <section id="publications" class="section s-dark">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-label">Scholarly Output</span>
        <h2 class="section-title">Publications</h2>
      </div>
      <div class="pub-filters reveal" id="pubFilters"></div>
      <div class="pub-list" id="pubContainer"></div>
    </div>
  </section>

  <!-- NEWS (hidden — remove style="display:none" to show) -->
  <section id="news" class="section s-light" style="display:none">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-label">Milestones</span>
        <h2 class="section-title">News</h2>
      </div>
      <div class="news-filters reveal" id="newsFilters"></div>
      <div class="news-timeline" id="newsContainer"></div>
    </div>
  </section>

  <!-- EXPERIENCE -->
  <section id="experience" class="section s-dark">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-label">Background</span>
        <h2 class="section-title">Experience</h2>
      </div>
      <h3 class="subsection-title reveal">Professional Experience</h3>
      <div id="expContainer"></div>
      <!-- Invited Talks (hidden — remove style="display:none" to show) -->
      <div style="display:none">
        <h3 class="subsection-title reveal">Invited Talks</h3>
        <div class="talks-list" id="talksContainer"></div>
      </div>
    </div>
  </section>


  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-name" id="footerName"></p>
        <div class="footer-divider"></div>
        <p class="footer-copy" id="footerCopy"></p>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
